<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1000" height="620" fill="#F6F3EC"/>
  <text x="60" y="78" font-size="42" font-weight="700" fill="#0B2545">EchoDrop</text>
  <text x="60" y="110" font-size="20" fill="#1C48B5">Le boîtier, clipsé sur la conduite</text>

  <!-- PIPE -->
  <g>
    <rect x="90" y="392" width="820" height="96" fill="#C3C9CF"/>
    <rect x="90" y="392" width="820" height="26" fill="#D9DDE1"/>
    <rect x="90" y="466" width="820" height="22" fill="#A7AEB5"/>
    <ellipse cx="90" cy="440" rx="26" ry="48" fill="#AEB5BC"/>
    <ellipse cx="910" cy="440" rx="26" ry="48" fill="#B7BDC3"/>
    <text x="620" y="556" font-size="17" fill="#8A8578">conduite d'eau</text>
  </g>

  <!-- CLAMP arms wrapping the pipe -->
  <path d="M405 360 C360 380 360 470 402 486" fill="none" stroke="#0A1E38" stroke-width="14" stroke-linecap="round"/>
  <path d="M595 360 C640 380 640 470 598 486" fill="none" stroke="#0A1E38" stroke-width="14" stroke-linecap="round"/>

  <!-- DEVICE body -->
  <rect x="382" y="232" width="236" height="140" rx="26" fill="#0B2545"/>
  <rect x="382" y="232" width="236" height="34" rx="26" fill="#123059"/>
  <!-- face plate -->
  <rect x="404" y="258" width="192" height="92" rx="14" fill="#F6F3EC"/>
  <text x="500" y="300" font-size="24" font-weight="700" fill="#0B2545" text-anchor="middle">EchoDrop</text>
  <!-- status LED -->
  <circle cx="437" cy="330" r="7" fill="#1C48B5"/>
  <circle cx="437" cy="330" r="12" fill="none" stroke="#1C48B5" stroke-width="2" opacity="0.35"/>
  <text x="470" y="335" font-size="13" fill="#6B7280">à l'écoute</text>

  <!-- sound waves going into the pipe -->
  <g stroke="#1C48B5" stroke-width="3" fill="none" opacity="0.85" stroke-linecap="round">
    <path d="M470 386 q30 26 60 0"/>
    <path d="M455 396 q45 40 90 0"/>
    <path d="M440 406 q60 54 120 0"/>
  </g>

  <text x="60" y="596" font-size="16" fill="#8A8578">Capteur acoustique + microcontrôleur ESP32 · alerte WiFi · coût matériel de l'ordre de quelques dizaines de dinars</text>
</svg>
